version: "3.9"

services:

  perception-api:
    build: .
    container_name: perception-api

    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - perception-api

  grafana:
    image: grafana/grafana

    container_name: grafana

    ports:
      - "3000:3000"

    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true

    depends_on:
      - prometheus